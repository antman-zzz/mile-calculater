<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>マイル計算機</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>空港間マイル計算機</h1>

    <div id="floating-panel">
        <div class="airport-inputs">
            <label>空港:</label>
            <input type="text" id="airportA" placeholder="出発地 (HND)">
            <input type="text" id="airportB" placeholder="到着地 (JFK)">
            <button id="calculate">距離計算</button>
        </div>
        <div class="distance-result">
             <p id="distance">距離: --- miles</p>
        </div>
        <div class="percentage-calculator">
            <label>割合:</label>
            <input type="number" id="percentage" placeholder="50">%
            <button id="calculate-percentage">マイル計算</button>
            <p id="percentage-result">結果: --- miles</p>
        </div>
    </div>

    <div id="map"></div>

    <div id="airport-list">
        <h2>空港リスト</h2>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="script.js"></script>
</body>
</html>
